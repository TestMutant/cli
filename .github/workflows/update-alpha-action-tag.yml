name: Update Alpha Action Tag

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-alpha:
    name: Move alpha action tag
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cli
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Verify dist is committed
        run: |
          if ! git diff --exit-code -- dist; then
            echo "dist is out of date."
            git status --short dist
            git diff --stat -- dist
            exit 1
          fi

      - name: Move alpha tag
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "testmutant-bot[bot]"
          git config user.email "testmutant-bot[bot]@users.noreply.github.com"

          git tag -f alpha "$GITHUB_SHA"
          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" alpha --force