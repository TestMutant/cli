name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify hosted runner package invocation
        run: npm run test:package

      - name: Verify dist is committed
        run: |
          if ! git diff --exit-code -- dist; then
            echo "dist is out of date. Changed files:"
            git status --short dist
            echo ""
            echo "Diff stat:"
            git diff --stat -- dist
            echo ""
            echo "First 160 lines of diff:"
            git diff -- dist | head -n 160
            exit 1
          fi
