name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - dist/**

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Tag and publish
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cli
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Verify dist is committed
        run: |
          if ! git diff --exit-code -- dist; then
            echo "dist is out of date."
            git status --short dist
            git diff --stat -- dist
            exit 1
          fi

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "testmutant-bot[bot]"
          git config user.email "testmutant-bot[bot]@users.noreply.github.com"

          git tag "$TAG" "$GITHUB_SHA"

          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"

      - name: Show trusted publishing identity
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"

      - name: Publish package
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            PRERELEASE_TAG="${PACKAGE_VERSION#*-}"
            DIST_TAG="${PRERELEASE_TAG%%.*}"

            echo "Publishing prerelease $PACKAGE_VERSION with npm dist-tag '$DIST_TAG'"
            npm publish --access public --tag "$DIST_TAG"
          else
            echo "Publishing stable $PACKAGE_VERSION with npm dist-tag 'latest'"
            npm publish --access public
          fi