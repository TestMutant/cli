name: TestMutant
description: Run TestMutant ticket-linked QA in CI.

inputs:
  run_kind:
    description: "Run kind: Advisory, Execution, or Generation."
    required: false
    default: Advisory

  api_url:
    description: TestMutant API URL.
    required: false
    default: https://api.testmutant.com

  repository:
    description: Repository full name override, e.g. owner/repo.
    required: false

  provider:
    description: Repository provider.
    required: false
    default: GitHub

  base_url:
    description: Application base URL.
    required: false

  environment_name:
    description: Environment name, e.g. staging, preview, production.
    required: false

  test_spec_id:
    description: Test spec ID to scope the run to a single spec.
    required: false

runs:
  using: composite
  steps:
    - name: Install TestMutant action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev

    - name: Run TestMutant
      shell: bash
      working-directory: ${{ github.action_path }}
      run: node dist/action.js
      env:
        TESTMUTANT_API_KEY: ${{ env.TESTMUTANT_API_KEY }}
        INPUT_RUN_KIND: ${{ inputs.run_kind }}
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_BASE_URL: ${{ inputs.base_url }}
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment_name }}
        INPUT_TEST_SPEC_ID: ${{ inputs.test_spec_id }}